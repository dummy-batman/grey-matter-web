<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Grey Matter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <div class="col-lg-6 d-none d-lg-flex bg-dark text-white align-items-center justify-content-center p-5 left-panel">
                <div class="text-center">
                    <h1 class="display-3 brand-serif">Grey Matter</h1>
                    <p class="lead mt-3">Access decades of industry wisdom. The boardroom is now open.</p>
                    <div class="mt-5 quote-box">
                        <p class="fst-italic">"Experience is the only currency that never devalues."</p>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 col-md-12 d-flex align-items-center justify-content-center bg-light position-relative">
                <div class="position-absolute top-0 end-0 p-4">
                    <a href="learner-home.html" class="text-decoration-none text-muted fw-bold small">Skip for now <i class="bi bi-arrow-right"></i></a>
                </div>
                <div class="login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <img src="logo.jpg" alt="Logo" class="mb-3 logo-img">
                        <h2 class="brand-serif">Welcome Back</h2>
                    </div>
                    <div class="btn-group w-100 mb-4" role="group">
                        <input type="radio" class="btn-check" name="role" id="learner" checked>
                        <label class="btn btn-outline-dark" for="learner">I want to Learn</label>
                        <input type="radio" class="btn-check" name="role" id="expert">
                        <label class="btn btn-outline-dark" for="expert">I am an Expert</label>
                    </div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" class="form-control form-control-lg" placeholder="user@gmail.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-dark btn-lg w-100 mb-3 py-3">Enter the Boardroom</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
