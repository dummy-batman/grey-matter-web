<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply as Expert | Grey Matter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="apply.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="loginweb.html">
                <img src="logo.jpg" alt="GM" width="40" class="me-2">
                <span class="brand-serif fw-bold">GREY MATTER</span>
            </a>
            <span class="text-muted small">Expert Admission</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h2 class="brand-serif">Join the Network</h2>
                        <p class="text-muted">Share your decades of experience with the next generation of leaders.</p>
                    </div>

                    <form>
                        <h5 class="brand-serif mb-4 border-bottom pb-2">1. Personal Details</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Full Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Robert Richards">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Last Held Designation</label>
                                <input type="text" class="form-control" placeholder="e.g. Chief Operations Officer">
                            </div>
                        </div>

                        <h5 class="brand-serif mb-4 border-bottom pb-2">2. Expertise</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Primary Industry</label>
                                <select class="form-select">
                                    <option selected>Choose Industry...</option>
                                    <option>Finance & Banking</option>
                                    <option>Manufacturing</option>
                                    <option>Information Technology</option>
                                    <option>Healthcare</option>
                                    <option>Legal</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Total Years of Experience</label>
                                <input type="number" class="form-control" placeholder="Minimum 20 years recommended">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Professional Bio</label>
                                <textarea class="form-control" rows="4" placeholder="Briefly describe your career milestones..."></textarea>
                            </div>
                        </div>

                        <h5 class="brand-serif mb-4 border-bottom pb-2">3. Verification</h5>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Upload Resume / LinkedIn Profile (PDF)</label>
                            <div class="upload-box text-center p-4 border rounded">
                                <i class="bi bi-file-earmark-pdf fs-1 text-muted"></i>
                                <p class="small text-muted mt-2">Drag and drop your file here or <span class="text-primary cursor-pointer">browse</span></p>
                                <input type="file" class="d-none" id="fileUpload">
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="terms">
                            <label class="form-check-label small text-muted" for="terms">
                                I certify that the information provided is accurate and I agree to the Grey Matter vetting process.
                            </label>
                        </div>

                        <button type="submit" class="btn btn-dark btn-lg w-100 py-3">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
